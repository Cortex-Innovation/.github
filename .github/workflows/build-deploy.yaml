name: Build & Deploy (Reusable)

on:
  workflow_call:
    inputs:
      aws-region:
        required: true
        type: string
      aws-account-id:
        required: true
        type: string
      role-arn:
        required: true
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          aws ecr describe-repositories --repository-names "$REPO_NAME" 2>/dev/null || \
            aws ecr create-repository --repository-name "$REPO_NAME" \
              --image-scanning-configuration scanOnPush=true \
              --image-tag-mutability MUTABLE

      - name: Build, tag and push
        id: meta
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          TAG="${GITHUB_SHA::8}"
          IMAGE="$REGISTRY/$REPO_NAME:$TAG"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Update image in values.yaml
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          REPO_NAME: ${{ github.event.repository.name }}
          AWS_ACCOUNT_ID: ${{ inputs.aws-account-id }}
          AWS_REGION: ${{ inputs.aws-region }}
        run: |
          sed -i "s|repository: .*|repository: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/$REPO_NAME|" values.yaml
          sed -i "s|tag: .*|tag: $TAG|" values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add values.yaml
          git diff --cached --quiet || git commit -m "chore: update image to ${GITHUB_SHA::8} [skip ci]"
          git push
