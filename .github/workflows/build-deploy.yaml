name: Build & Deploy (Reusable)

# Reusable workflow consumed by per-app `<app>/.github/workflows/deploy.yaml`.
#
# Behaviors:
#   1. OIDC login to AWS via the shared `github-actions-ci` IAM role
#   2. Login to ECR + auto-create the per-app repo on first push
#   3. Build Dockerfile from repo root
#   4. Tag image with first 8 chars of GITHUB_SHA + push to ECR
#   5. Write-back the new tag/repository to a values.yaml — TWO modes:
#
#      a) gitops mode (recommended) — when `gitops-repo` +
#         `gitops-values-path` inputs are set, clones the gitops repo,
#         updates the file at the given path, commits + pushes back.
#         Uses a GitHub App installation token (cross-repo write).
#
#      b) legacy self-repo mode (fallback) — when gitops-repo is
#         empty, updates `values.yaml` in the calling repo (kept for
#         repos that haven't migrated to centralized gitops).

on:
  workflow_call:
    inputs:
      aws-region:
        required: true
        type: string
      aws-account-id:
        required: true
        type: string
      role-arn:
        required: true
        type: string

      # Gitops write-back mode (recommended)
      gitops-repo:
        required: false
        type: string
        default: ""
        description: "Target gitops repo as <owner>/<repo>. When set, write-back goes here instead of the calling repo."
      gitops-values-path:
        required: false
        type: string
        default: ""
        description: "Path inside gitops-repo to the values.yaml that holds image.repository + image.tag."
      gitops-branch:
        required: false
        type: string
        default: "main"
        description: "Branch in gitops-repo to commit to. Default: main."

      gitops-app-id:
        required: false
        type: string
        default: ""
        description: "GitHub App ID (numeric, NOT secret) used to mint cross-repo write tokens. Required when gitops-repo is set."

      # Argo CD UI write-back (Application spec.info)
      # When ARGOCD_AUTH_TOKEN reaches via `secrets: inherit` AND argocd-server
      # is set, the workflow appends image/digest/commit/built entries to the
      # Application's spec.info so they render as clickable rows in the UI
      # Summary panel — alongside the static `App source` and `Values overlay`
      # entries declared in the cortex-gitops ApplicationSet template.
      argocd-server:
        required: false
        type: string
        default: ""
        description: "Argo CD API host (e.g. argocd.eks-cortex-platform-prd-us-east-1.estabilis-cortex.com). When empty the UI write-back step is skipped."
      argocd-app-name:
        required: false
        type: string
        default: ""
        description: "Argo CD Application name to update. Default: lowercase repo name (matches the ApplicationSet path.basename convention)."

    # Secrets reaching via `secrets: inherit` at the caller:
    # - GITOPS_APP_PRIVATE_KEY — required when gitops-repo is set
    # - ARGOCD_AUTH_TOKEN     — required when argocd-server is set
    # App ID is passed as a regular input above (it's public information;
    # no need to mask).

permissions:
  id-token: write   # OIDC AssumeRoleWithWebIdentity
  contents: write   # legacy self-repo write-back fallback

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute lowercase repo name (ECR rejects uppercase)
        id: repo
        run: |
          NAME=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repository exists
        env:
          REPO_NAME: ${{ steps.repo.outputs.name }}
        run: |
          aws ecr describe-repositories --repository-names "$REPO_NAME" 2>/dev/null || \
            aws ecr create-repository --repository-name "$REPO_NAME" \
              --image-scanning-configuration scanOnPush=true \
              --image-tag-mutability MUTABLE

      - name: Build, tag and push
        id: meta
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO_NAME: ${{ steps.repo.outputs.name }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_SHA::8}"
          IMAGE="$REGISTRY/$REPO_NAME:$TAG"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          DIGEST=$(docker buildx imagetools inspect "$IMAGE" --format '{{.Manifest.Digest}}')
          if [[ ! "$DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "::error::Could not parse sha256 digest from buildx; got: $DIGEST"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "::notice::Pushed $IMAGE @ $DIGEST"

      # ─── Gitops write-back (cross-repo) ─────────────────────────────

      - name: Parse gitops-repo into owner / repo
        if: inputs.gitops-repo != ''
        id: gitops-parse
        env:
          GITOPS_REPO: ${{ inputs.gitops-repo }}
        run: |
          IFS='/' read -r OWNER REPO <<< "$GITOPS_REPO"
          if [ -z "$OWNER" ] || [ -z "$REPO" ]; then
            echo "::error::gitops-repo must be in <owner>/<repo> format, got: $GITOPS_REPO"
            exit 1
          fi
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"

      - name: Verify gitops PEM secret reaches the reusable workflow
        if: inputs.gitops-repo != ''
        env:
          PEM: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
        run: |
          if [ -z "${PEM:-}" ]; then
            echo "::error::GITOPS_APP_PRIVATE_KEY is empty in this workflow context. Caller must use \`secrets: inherit\` AND the org secret must allow this repo."
            exit 1
          fi
          echo "::notice::GITOPS_APP_PRIVATE_KEY reached (length=${#PEM})"

      - name: Generate gitops App installation token
        if: inputs.gitops-repo != ''
        id: gitops-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ inputs.gitops-app-id }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          owner: ${{ steps.gitops-parse.outputs.owner }}
          repositories: ${{ steps.gitops-parse.outputs.repo }}

      - name: Update image in gitops values file
        if: inputs.gitops-repo != ''
        env:
          TOKEN: ${{ steps.gitops-token.outputs.token }}
          OWNER: ${{ steps.gitops-parse.outputs.owner }}
          REPO: ${{ steps.gitops-parse.outputs.repo }}
          BRANCH: ${{ inputs.gitops-branch }}
          VALUES_PATH: ${{ inputs.gitops-values-path }}
          TAG: ${{ steps.meta.outputs.tag }}
          DIGEST: ${{ steps.meta.outputs.digest }}
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO_NAME: ${{ steps.repo.outputs.name }}
        run: |
          set -euo pipefail

          GITOPS_DIR="$(mktemp -d)"
          git clone --depth 1 --branch "$BRANCH" \
            "https://x-access-token:${TOKEN}@github.com/${OWNER}/${REPO}.git" "$GITOPS_DIR"
          cd "$GITOPS_DIR"

          if [ ! -f "$VALUES_PATH" ]; then
            echo "::error::values path not found in ${OWNER}/${REPO}: $VALUES_PATH"
            ls -la "$(dirname "$VALUES_PATH")" 2>/dev/null || echo "  (parent dir does not exist)"
            exit 1
          fi

          # yq is pre-installed on ubuntu-latest runners (Mike Farah v4).
          # Surgical YAML updates — image.repository + image.tag + image.digest.
          # Digest is the runtime-pinning source (Kyverno PSS Restricted requires it);
          # tag is kept as a human breadcrumb for debugging.
          yq -i ".image.repository = \"${REGISTRY}/${REPO_NAME}\"" "$VALUES_PATH"
          yq -i ".image.tag = \"${TAG}\"" "$VALUES_PATH"
          yq -i ".image.digest = \"${DIGEST}\"" "$VALUES_PATH"

          if git diff --quiet "$VALUES_PATH"; then
            echo "::notice::No changes to ${VALUES_PATH} (already at digest ${DIGEST})"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$VALUES_PATH"
          git commit -m "chore(${REPO_NAME}): bump image to ${TAG} (${DIGEST}) [skip ci]"
          git push origin "$BRANCH"

          echo "::notice::Updated ${OWNER}/${REPO}/${VALUES_PATH} to ${TAG} @ ${DIGEST}"

      # ─── Argo CD UI write-back (spec.info) ──────────────────────────
      #
      # Append image/digest/commit/built entries to the Application's
      # `spec.info` so the Argo CD UI Summary panel surfaces what is
      # actually deployed (multi-source apps otherwise show only the
      # common-app chart version, hiding the real app version). The
      # static `App source` and `Values overlay` entries are declared
      # inline in the cortex-gitops ApplicationSet template and re-sent
      # here on each call so a `argocd app set --info` (which replaces
      # the whole list) does not strip them.
      #
      # The cortex-gitops ApplicationSet must carry
      # `spec.ignoreApplicationDifferences: [{jsonPointers: [/spec/info]}]`
      # for these dynamic entries to survive subsequent reconciles.

      - name: Determine Argo CD app name
        if: inputs.argocd-server != ''
        id: argocd-app
        env:
          OVERRIDE: ${{ inputs.argocd-app-name }}
          REPO_NAME: ${{ steps.repo.outputs.name }}
        run: |
          NAME="${OVERRIDE:-$REPO_NAME}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Install Argo CD CLI
        if: inputs.argocd-server != ''
        run: |
          set -euo pipefail
          # Pin minor; cluster runs v3.3.x and CLI is forward-compatible
          # with the same major. Bump together when the platform bumps
          # the chart.
          ARGOCD_VERSION="v3.3.2"
          curl -sSL -o /usr/local/bin/argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd
          argocd version --client | head -1

      - name: Update Argo CD Application spec.info
        if: inputs.argocd-server != ''
        env:
          ARGOCD_SERVER: ${{ inputs.argocd-server }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          APP: ${{ steps.argocd-app.outputs.name }}
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO_NAME: ${{ steps.repo.outputs.name }}
          TAG: ${{ steps.meta.outputs.tag }}
          DIGEST: ${{ steps.meta.outputs.digest }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITOPS_REPO: ${{ inputs.gitops-repo }}
          VALUES_PATH: ${{ inputs.gitops-values-path }}
        run: |
          set -euo pipefail

          if [ -z "${ARGOCD_AUTH_TOKEN:-}" ]; then
            echo "::error::ARGOCD_AUTH_TOKEN is empty. Caller must use \`secrets: inherit\` AND the org secret must be visible to this repo."
            exit 1
          fi

          BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          COMMIT_URL="https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          APP_SOURCE_URL="https://github.com/${GITHUB_REPOSITORY}"

          # Argo CD v3.x removed `argocd app set --info`; use `app patch`
          # with a merge patch instead. The patch replaces the whole
          # `spec.info` array — so the static entries declared in the
          # ApplicationSet template (App source + Values overlay) are
          # re-sent on every call to keep them present in the UI.
          INFO_JSON='[]'
          INFO_JSON=$(jq -nc \
            --arg app_source "${APP_SOURCE_URL}" \
            --arg values_overlay_repo "${GITOPS_REPO:-}" \
            --arg values_overlay_path "${VALUES_PATH:-}" \
            --arg image "${REGISTRY}/${REPO_NAME}:${TAG}" \
            --arg digest "${DIGEST}" \
            --arg commit "${COMMIT_URL}" \
            --arg built "${BUILT_AT}" \
            '
            [{name: "App source", value: $app_source}]
            + (if $values_overlay_repo != "" and $values_overlay_path != ""
               then [{name: "Values overlay", value: ("https://github.com/" + $values_overlay_repo + "/blob/main/" + $values_overlay_path)}]
               else []
               end)
            + [
                {name: "Image",  value: $image},
                {name: "Digest", value: $digest},
                {name: "Commit", value: $commit},
                {name: "Built",  value: $built}
              ]
            ')

          PATCH=$(jq -nc --argjson info "$INFO_JSON" '{spec: {info: $info}}')
          argocd app patch "${APP}" --type merge --patch "$PATCH" --grpc-web

          echo "::notice::Updated Argo CD Application '${APP}' info with ${TAG} @ ${DIGEST}"

      # ─── Legacy self-repo write-back (fallback) ─────────────────────

      - name: Update image in self values.yaml (legacy)
        if: inputs.gitops-repo == ''
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          DIGEST: ${{ steps.meta.outputs.digest }}
          REPO_NAME: ${{ steps.repo.outputs.name }}
          AWS_ACCOUNT_ID: ${{ inputs.aws-account-id }}
          AWS_REGION: ${{ inputs.aws-region }}
        run: |
          yq -i ".image.repository = \"${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${REPO_NAME}\"" values.yaml
          yq -i ".image.tag = \"${TAG}\"" values.yaml
          yq -i ".image.digest = \"${DIGEST}\"" values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add values.yaml
          git diff --cached --quiet || git commit -m "chore: update image to ${TAG} (${DIGEST}) [skip ci]"
          git push
